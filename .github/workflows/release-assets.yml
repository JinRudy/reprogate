name: release-assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: reprogate-linux-amd64
          - goos: linux
            goarch: arm64
            asset: reprogate-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: reprogate-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: reprogate-darwin-arm64
          - goos: windows
            goarch: amd64
            asset: reprogate-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset: reprogate-windows-arm64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.asset }}" ./cmd/reprogate
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ matrix.asset }}" --clobber
