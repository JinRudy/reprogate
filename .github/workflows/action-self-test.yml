name: action-self-test

on:
  push:
  pull_request:

jobs:
  default-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run local ReproGate action
        id: reprogate
        uses: ./
        with:
          event-path: .github/fixtures/low-signal-issue-event.json
      - name: Assert missing evidence outputs
        shell: bash
        run: |
          test "${{ steps.reprogate.outputs.ready }}" = "false"
          test "${{ steps.reprogate.outputs.missing_count }}" = "3"
          test "${{ steps.reprogate.outputs.labels }}" = "needs-repro,missing-env,missing-log"

  fail-on-missing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run local ReproGate action with fail-on-missing
        id: reprogate
        uses: ./
        continue-on-error: true
        with:
          event-path: .github/fixtures/low-signal-issue-event.json
          fail-on-missing: "true"
      - name: Assert missing evidence fails
        shell: bash
        run: |
          test "${{ steps.reprogate.outcome }}" = "failure"

  ready-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run local ReproGate action on ready issue
        id: reprogate
        uses: ./
        with:
          event-path: .github/fixtures/ready-issue-event.json
          fail-on-missing: "true"
      - name: Assert ready outputs
        shell: bash
        run: |
          test "${{ steps.reprogate.outputs.ready }}" = "true"
          test "${{ steps.reprogate.outputs.missing_count }}" = "0"

  comment-on-missing-ready-skip:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Run local ReproGate action with comment-on-missing on ready issue
        id: reprogate
        uses: ./
        with:
          event-path: .github/fixtures/ready-issue-event.json
          comment-on-missing: "true"
      - name: Assert ready outputs
        shell: bash
        run: |
          test "${{ steps.reprogate.outputs.ready }}" = "true"
          test "${{ steps.reprogate.outputs.missing_count }}" = "0"
